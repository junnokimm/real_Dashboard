<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/login.css" />
</head>
<body>
  <div class="loginPage">
    <form class="loginCard" id="loginForm">
      <div class="loginBrand">
        <div class="loginLogo" aria-hidden="true"></div>
        <div>
          <div class="loginBrandText">AB Dashboard</div>
          <div class="loginBrandSub">운영자 로그인</div>
        </div>
      </div>

      <h1>로그인</h1>
      <p class="loginLead">허용된 계정으로 로그인하면 접근 가능한 <span class="mono">site_id</span>만 dashboard/editor에서 볼 수 있습니다.</p>

      <label class="loginField" for="username">
        <span>아이디</span>
        <input id="username" name="username" type="text" autocomplete="username" required />
      </label>

      <label class="loginField" for="password">
        <span>비밀번호</span>
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </label>

      <button class="loginSubmit" id="loginBtn" type="submit">로그인</button>
      <div class="loginError" id="errorBox"></div>
      <div class="loginHint">기본 계정은 서버 최초 실행 시 환경 변수로 시드됩니다. 운영에서는 반드시 안전한 비밀번호로 바꾸세요.</div>
    </form>
  </div>
  <script src="/login.js"></script>
</body>
</html>
